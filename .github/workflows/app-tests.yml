name: App Tests

on: push 

jobs:
  sampleapp-tests:
    name: "Run Tests"
    runs-on:"ubuntu-latest"
    
    steps:
    - uses: actions/checkout@v3
  
    -name: "Install Dependencies"
    -working-directory: ./sampleapp
    run: npm install
  
    -name: "Run Tests"
    -working-directory: ./sampleapp
    run: npm test